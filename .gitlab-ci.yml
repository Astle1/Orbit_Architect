stages:
  - architecture_check
  - release

orbit_architect:
  stage: architecture_check
  image: python:3.10
  script:
    - pip install -r requirements.txt
    - python src/main.py
  artifacts:
    when: always
    paths:
      - violation_report.json
      - mr_comment.md
      - rules.json
      - edges.csv

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script: echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG of Orbit Architect"
